# Harness Suite — unconditional CI gate for the agent-harness E2E specs.
#
# Runs on every push and pull_request. The MUONROI_E2E_LIVE flag is
# intentionally absent so ideal-e2e-live.spec.ts skips automatically (it
# costs real LLM tokens and takes 10-15 minutes). Only events.spec.ts and
# other unconditional harness specs run.
#
# Nightly with live LLM (not configured here):
#   If a nightly pipeline is added, set MUONROI_E2E_LIVE: "1" in that
#   job's env: block to opt in to the real-token live E2E run.

name: Harness Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  harness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run harness E2E suite
        run: bunx vitest -c vitest.harness.config.ts run tests/harness/
