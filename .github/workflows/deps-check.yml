name: deps-check
on:
  schedule:
    - cron: "0 8 * * 1"   # 08:00 UTC every Monday
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  outdated:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.13"
      - name: bun outdated
        run: bun outdated > deps-outdated.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: deps-outdated-${{ github.run_id }}
          path: deps-outdated.txt
          retention-days: 30
