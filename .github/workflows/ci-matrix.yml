name: ci-matrix
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.13"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bunx vitest run
      - name: Boot smoke (headless)
        shell: bash
        run: |
          bun run src/index.ts --smoke-boot-only
          echo "Boot smoke OK (exit 0)"
  build-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            outfile: dist/muonroi-cli-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            outfile: dist/muonroi-cli-windows-x64.exe
          - os: macos-latest
            target: bun-darwin-arm64
            outfile: dist/muonroi-cli-darwin-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.13"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} ./src/index.ts --outfile ${{ matrix.outfile }}
      - name: Verify binary exists
        shell: bash
        run: |
          ls -la ${{ matrix.outfile }}*
          echo "Binary compiled successfully for ${{ matrix.target }}"
