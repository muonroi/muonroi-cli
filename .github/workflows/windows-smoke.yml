name: windows-smoke
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.13"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build agent-harness-core (browser bundle)
        run: bun --filter @muonroi/agent-harness-core build
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bunx vitest run
      - name: Boot smoke (headless)
        shell: pwsh
        run: bun run src/index.ts --smoke-boot-only
