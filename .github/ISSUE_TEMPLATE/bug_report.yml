name: Bug Report
description: Report a bug in muonroi-cli
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting

        1. Run `muonroi-cli doctor` and paste the output below.
        2. Run `muonroi-cli bug-report > report.json` and attach the file.
        3. **IMPORTANT: Auto-redaction** — `bug-report` automatically scrubs API keys and secrets.
           If you include any other output (logs, terminal screenshots), manually redact:
           - API keys (anything starting with `sk-`)
           - Auth tokens
           - File paths containing usernames (replace with `~`)
           - Any prompt content you consider private

  - type: textarea
    id: doctor-output
    attributes:
      label: Doctor Output
      description: Paste the output of `muonroi-cli doctor`
      placeholder: |
        [PASS] bun_version: Bun 1.3.13
        [PASS] os: win32 10.0.26200 x64
        ...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug
      placeholder: |
        1. Run `muonroi-cli --prompt "..."`
        2. ...
    validations:
      required: true

  - type: dropdown
    id: permission-mode
    attributes:
      label: Permission Mode
      description: Which permission mode were you using?
      options:
        - safe (default)
        - auto-edit
        - yolo
    validations:
      required: true

  - type: textarea
    id: bug-report-json
    attributes:
      label: Bug Report Bundle
      description: "Attach or paste the output of `muonroi-cli bug-report` (auto-redacted)"
      render: json
    validations:
      required: false
